<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasa Push Rank FF</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

select, input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.admin {
  background: #020617;
  padding: 15px;
  margin-top: 30px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
🔥 JASA PUSH RANK FREE FIRE 🔥
</header>

<div class="container">

<div class="card">
<h3>📊 Pilih Layanan</h3>

<select id="mode">
<option value="Solo Rank">Solo Rank</option>
<option value="Squad Rank">Squad Rank</option>
<option value="2v2">Mode 2v2</option>
<option value="4v4">Mode 4v4</option>
</select>

<select id="rank">
<option value="Bronze">Bronze</option>
<option value="Silver">Silver</option>
<option value="Gold">Gold</option>
<option value="Platinum">Platinum</option>
<option value="Diamond">Diamond</option>
<option value="Heroic">Heroic</option>
<option value="Grandmaster">Grandmaster</option>
</select>

<input type="text" id="idgame" placeholder="Masukkan ID Game">

<select id="payment">
<option value="DANA">DANA</option>
<option value="GoPay">GoPay</option>
</select>

<button onclick="order()">Order Sekarang</button>
</div>

<div class="card">
<h3>💰 Harga</h3>
<p id="harga">Pilih rank untuk lihat harga</p>
</div>

<div class="card">
<h3>📱 Pembayaran</h3>
<p>DANA: 08xxxxxxxxxx</p>
<p>GoPay: 08xxxxxxxxxx</p>
</div>

<div class="admin">
<h3>🔒 Admin Panel</h3>
<input type="password" id="adminPass" placeholder="Password Admin">
<button onclick="loginAdmin()">Login</button>

<div id="adminPanel" class="hidden">
<h4>📦 Data Order</h4>
<ul id="listOrder"></ul>
</div>
</div>

</div>

<script>
const hargaRank = {
  Bronze: 5000,
  Silver: 10000,
  Gold: 15000,
  Platinum: 20000,
  Diamond: 30000,
  Heroic: 50000,
  Grandmaster: 80000
};

document.getElementById("rank").addEventListener("change", function() {
  let rank = this.value;
  document.getElementById("harga").innerText =
    "Harga: Rp " + hargaRank[rank];
});

function order() {
  let mode = document.getElementById("mode").value;
  let rank = document.getElementById("rank").value;
  let idgame = document.getElementById("idgame").value;
  let payment = document.getElementById("payment").value;
  let harga = hargaRank[rank];

  if (!idgame) {
    alert("Isi ID Game!");
    return;
  }

  let data = {
    mode,
    rank,
    idgame,
    payment,
    harga
  };

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(data);
  localStorage.setItem("orders", JSON.stringify(orders));

  let pesan = `Halo admin, saya mau order:
Mode: ${mode}
Rank: ${rank}
ID: ${idgame}
Harga: Rp ${harga}
Pembayaran: ${payment}`;

  let wa = "https://wa.me/628xxxxxxxxxx?text=" + encodeURIComponent(pesan);
  window.open(wa, "_blank");

  alert("Order berhasil!");
}

function loginAdmin() {
  let pass = document.getElementById("adminPass").value;

  if (pass === "admin123") {
    document.getElementById("adminPanel").classList.remove("hidden");
    tampilkanOrder();
  } else {
    alert("Password salah!");
  }
}

function tampilkanOrder() {
  let list = document.getElementById("listOrder");
  list.innerHTML = "";

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.forEach((o, i) => {
    let li = document.createElement("li");
    li.innerText = `${i+1}. ${o.mode} - ${o.rank} - ${o.idgame} - Rp${o.harga} (${o.payment})`;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
